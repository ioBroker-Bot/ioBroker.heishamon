name: Test and Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs type-check, lint and the package validation (test:package) via the
  # standard ioBroker check action. No continue-on-error: a failure here fails
  # the workflow.
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '24.x'
          type-checking: true
          lint: true

  # Runs the unit tests (test:unit / Vitest) and the standard ioBroker
  # integration test (test:integration, which boots a real js-controller and
  # this adapter) on every supported OS and Node.js version.
  adapter-tests:
    needs: [check-and-lint]
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          build: true

  # Publishes to npm and creates a GitHub release on a version tag. Uses npm
  # trusted publishing (OIDC) — no npm-token — so the published package is
  # signed with provenance. Requires a trusted publisher to be configured for
  # this package on npmjs.com (repo + workflow file).
  deploy:
    needs: [check-and-lint, adapter-tests]
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '24.x'
          build: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
